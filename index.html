<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Skin">
<meta name="theme-color" content="#f5f0eb">
<title>Skincare Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧴</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0eb;
  --paper: #fdfaf7;
  --ink: #1a1410;
  --muted: #8a7f76;
  --line: #d9d0c7;
  --accent: #c4603a;
  --green: #7a9e7e;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; font-weight: 300; color: var(--ink); overscroll-behavior: none; }

.app { display: flex; flex-direction: column; height: 100%; max-width: 640px; margin: 0 auto; }

/* NAV */
.nav { display: flex; background: var(--paper); border-bottom: 1px solid var(--line); padding-top: var(--safe-top); flex-shrink: 0; }
.nav-btn { flex: 1; padding: 0.85rem 0.5rem; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* SCROLL */
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1.5rem 1rem calc(1.5rem + var(--safe-bottom)); }

/* WEEK HEADER */
.week-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--ink); padding-bottom: 1rem; margin-bottom: 1.5rem; }
.page-title { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
.week-nav { display: flex; align-items: center; gap: 0.5rem; }
.week-arrow { background: none; border: none; font-size: 1.1rem; color: var(--muted); cursor: pointer; padding: 0.2rem 0.35rem; line-height: 1; touch-action: manipulation; }
.week-arrow:active { color: var(--accent); }
.week-display { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--ink); min-width: 88px; text-align: center; }

/* SECTION LABEL */
.section-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--line); }

.morning-block { margin-bottom: 2rem; }
.night-block { margin-bottom: 1.5rem; }

/* AM */
.header-row { display: flex; align-items: center; gap: 0.8rem; padding-bottom: 0.25rem; }
.h-spacer { width: 14px; flex-shrink: 0; }
.day-checks { display: flex; gap: 0.38rem; }
.day-header { width: 22px; font-family: 'DM Mono', monospace; font-size: 0.57rem; color: var(--muted); text-align: center; }

.routine-row { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0; border-bottom: 1px solid var(--line); }
.routine-row:last-child { border-bottom: none; }
.step-num { font-family: 'DM Mono', monospace; font-size: 0.57rem; color: var(--muted); width: 14px; flex-shrink: 0; }
.step-name { font-size: 0.85rem; flex: 1; }

.check-box { width: 22px; height: 22px; border: 1.5px solid var(--line); cursor: pointer; flex-shrink: 0; position: relative; transition: border-color 0.12s, background 0.12s; touch-action: manipulation; }
.check-box:active { border-color: var(--accent); }
.check-box.checked { border-color: var(--accent); background: var(--accent); }
.check-box.checked::after { content: ''; position: absolute; left: 6px; top: 3px; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }

/* PM */
.day-row { display: grid; grid-template-columns: 76px 1fr; border-bottom: 1px solid var(--line); min-height: 52px; }
.day-row:last-child { border-bottom: none; }
.day-col { padding: 0.6rem 0.7rem 0.6rem 0; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--line); }
.day-name { font-family: 'DM Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em; }
.active-tag { font-family: 'DM Mono', monospace; font-size: 0.56rem; color: var(--accent); margin-top: 2px; }
.steps-col { padding: 0.4rem 0 0.4rem 0.7rem; display: flex; flex-direction: column; gap: 0.18rem; justify-content: center; }
.night-step { display: flex; align-items: center; gap: 0.55rem; font-size: 0.8rem; }

.night-check { width: 18px; height: 18px; border: 1.5px solid var(--line); cursor: pointer; flex-shrink: 0; position: relative; transition: border-color 0.12s, background 0.12s; touch-action: manipulation; }
.night-check:active { border-color: var(--accent); }
.night-check.checked { border-color: var(--accent); background: var(--accent); }
.night-check.checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }

.treatment-name { color: var(--accent); }
.note-tag { font-family: 'DM Mono', monospace; font-size: 0.56rem; color: var(--muted); }

/* RULES + ACTIONS */
.rules { margin-top: 1.5rem; padding-top: 0.8rem; border-top: 1px solid var(--line); display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 1rem; }
.rule { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.rule span { color: var(--accent); }

.actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.action-btn { background: none; border: 1px solid var(--line); font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0.45rem 0.85rem; cursor: pointer; transition: all 0.15s; touch-action: manipulation; }
.action-btn:active { border-color: var(--accent); color: var(--accent); }
.action-btn.danger:active { border-color: #b03020; color: #b03020; }

/* STATS */
.stats-section { margin-bottom: 2rem; }
.stats-title { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--line); }

.kpi-row { display: flex; gap: 0.7rem; margin-bottom: 1.5rem; }
.kpi { flex: 1; border: 1px solid var(--line); padding: 0.75rem 0.6rem; }
.kpi-val { font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 500; color: var(--accent); line-height: 1; }
.kpi-label { font-size: 0.65rem; color: var(--muted); margin-top: 0.25rem; }

/* CHART */
.chart-wrap { margin-bottom: 1rem; }
.chart-bars { display: flex; gap: 3px; align-items: flex-end; height: 96px; }
.bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; gap: 0; }
.bar-pair { display: flex; gap: 2px; align-items: flex-end; width: 100%; }
.bar { flex: 1; min-height: 2px; }
.bar.am { background: var(--accent); opacity: 0.8; }
.bar.pm { background: var(--green); opacity: 0.8; }
.bar-lbl { font-family: 'DM Mono', monospace; font-size: 0.48rem; color: var(--muted); text-align: center; margin-top: 4px; line-height: 1.2; }

.chart-legend { display: flex; gap: 1rem; margin-top: 0.5rem; }
.legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; flex-shrink: 0; }

/* TABLE */
.compliance-table { width: 100%; border-collapse: collapse; }
.compliance-table th { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.08em; color: var(--muted); text-align: left; padding: 0.3rem 0; border-bottom: 1px solid var(--line); font-weight: 400; }
.compliance-table td { font-size: 0.8rem; padding: 0.45rem 0; border-bottom: 1px solid var(--line); vertical-align: middle; }
.compliance-table tr:last-child td { border-bottom: none; }
.pct { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent); text-align: right; white-space: nowrap; padding-left: 0.5rem; }
.mini-bar-wrap { height: 3px; background: var(--line); margin-top: 3px; }
.mini-bar { height: 3px; background: var(--accent); transition: width 0.3s; }

.no-data { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); text-align: center; padding: 3rem 0; letter-spacing: 0.06em; line-height: 2; }

/* TOAST */
.toast { position: fixed; bottom: calc(1.5rem + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; padding: 0.5rem 1.2rem; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; }
.toast.show { opacity: 1; }

@media print {
  .nav, .actions, .toast { display: none; }
  body { background: white; }
  .scroll { padding: 0; }
}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('tracker')">Tracker</button>
    <button class="nav-btn" onclick="showTab('stats')">Overview</button>
  </nav>

  <!-- TRACKER TAB -->
  <div id="tab-tracker" class="scroll">
    <div class="week-header">
      <div class="page-title">Skincare</div>
      <div class="week-nav">
        <button class="week-arrow" onclick="changeWeek(-1)">‹</button>
        <div class="week-display" id="week-display">–</div>
        <button class="week-arrow" onclick="changeWeek(1)">›</button>
      </div>
    </div>

    <div class="morning-block">
      <div class="section-label">Morning — daily</div>
      <div class="header-row">
        <div class="h-spacer"></div>
        <div style="width:14px;flex-shrink:0"></div>
        <div style="flex:1"></div>
        <div class="day-checks" id="am-headers"></div>
      </div>
      <div id="morning-rows"></div>
    </div>

    <div class="night-block">
      <div class="section-label">Night — Cleanser → Treatment → Moisturizer</div>
      <div id="night-rows"></div>
    </div>

    <div class="rules">
      <div class="rule"><span>!</span> No actives same day</div>
      <div class="rule"><span>BHA</span> nose only</div>
      <div class="rule"><span>Rec</span> = moisturizer only</div>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="resetCurrent()">Reset week</button>
      <button class="action-btn" onclick="window.print()">Print</button>
    </div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" class="scroll" style="display:none">
    <div id="stats-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const MORNING_STEPS = ['Cleanser','Azelaic acid','Moisturizer','Sunscreen'];
const DAY_SHORT = ['M','T','W','T','F','S','S'];
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const NIGHT = [
  { t:'Retinol',       active:true  },
  { t:'Recovery',      active:false },
  { t:'BHA',           active:true,  note:'nose only' },
  { t:'Recovery',      active:false },
  { t:'Retinol',       active:true  },
  { t:'Glycolic acid', active:true  },
  { t:'Recovery',      active:false },
];

// ── DB ─────────────────────────────────────────────────────────────────────
let db;
const DB_NAME = 'skincareDB', DB_VER = 1, STORE = 'weeks';

function openDB() {
  return new Promise((res,rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => e.target.result.createObjectStore(STORE, {keyPath:'week'});
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror   = e => rej(e);
  });
}

const tx  = (mode) => db.transaction(STORE, mode).objectStore(STORE);
const dbGet    = k  => new Promise((r,j) => { const q=tx('readonly').get(k);     q.onsuccess=e=>r(e.target.result); q.onerror=j; });
const dbPut    = v  => new Promise((r,j) => { const q=tx('readwrite').put(v);    q.onsuccess=()=>r();               q.onerror=j; });
const dbDel    = k  => new Promise((r,j) => { const q=tx('readwrite').delete(k); q.onsuccess=()=>r();               q.onerror=j; });
const dbGetAll = () => new Promise((r,j) => { const q=tx('readonly').getAll();   q.onsuccess=e=>r(e.target.result); q.onerror=j; });

// ── WEEK UTILS ─────────────────────────────────────────────────────────────
function mondayOf(date) {
  const d = new Date(date);
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  d.setHours(0,0,0,0);
  return d;
}
function weekKey(date) { return mondayOf(date).toISOString().slice(0,10); }
function weekLabel(key) {
  const [y,m,d] = key.split('-').map(Number);
  const mon = new Date(y,m-1,d);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = dt => `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}`;
  return `${f(mon)}–${f(sun)}`;
}

// ── STATE ──────────────────────────────────────────────────────────────────
let currentKey = weekKey(new Date());
let weekState  = {};

async function loadWeek() {
  const rec = await dbGet(currentKey);
  weekState = rec ? (rec.state || {}) : {};
  document.getElementById('week-display').textContent = weekLabel(currentKey);
  render();
}

async function persist() {
  await dbPut({ week: currentKey, label: weekLabel(currentKey), state: weekState });
}

function toggle(key) {
  weekState[key] = !weekState[key];
  persist();
  render();
}

function changeWeek(dir) {
  const d = new Date(currentKey);
  d.setDate(d.getDate() + dir*7);
  currentKey = weekKey(d);
  loadWeek();
}

async function resetCurrent() {
  if (!confirm("Reset this week's checks?")) return;
  weekState = {};
  await persist();
  render();
  toast('Week reset');
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  // AM headers
  const hc = document.getElementById('am-headers');
  hc.innerHTML = '';
  DAY_SHORT.forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-header';
    el.textContent = d;
    hc.appendChild(el);
  });

  // Morning
  const mc = document.getElementById('morning-rows');
  mc.innerHTML = '';
  MORNING_STEPS.forEach((step, si) => {
    const row = document.createElement('div');
    row.className = 'routine-row';

    const num = document.createElement('div');
    num.className = 'step-num';
    num.textContent = si+1;

    const name = document.createElement('div');
    name.className = 'step-name';
    name.textContent = step;

    const checks = document.createElement('div');
    checks.className = 'day-checks';
    DAY_SHORT.forEach((_,di) => {
      const k = `am-${si}-${di}`;
      const b = document.createElement('div');
      b.className = 'check-box' + (weekState[k] ? ' checked' : '');
      b.onclick = () => toggle(k);
      checks.appendChild(b);
    });
    row.append(num, name, checks);
    mc.appendChild(row);
  });

  // Night
  const nc = document.getElementById('night-rows');
  nc.innerHTML = '';
  DAY_NAMES.forEach((day, di) => {
    const sched = NIGHT[di];
    const row = document.createElement('div');
    row.className = 'day-row';

    const dayCol = document.createElement('div');
    dayCol.className = 'day-col';
    const dn = document.createElement('div');
    dn.className = 'day-name';
    dn.textContent = day;
    dayCol.appendChild(dn);
    if (sched.active) {
      const tag = document.createElement('div');
      tag.className = 'active-tag';
      tag.textContent = sched.t.toLowerCase();
      dayCol.appendChild(tag);
    }

    const stepsCol = document.createElement('div');
    stepsCol.className = 'steps-col';
    ['Cleanser', sched.t, 'Moisturizer'].forEach((step, si) => {
      const sr = document.createElement('div');
      sr.className = 'night-step';

      const k = `pm-${di}-${si}`;
      const b = document.createElement('div');
      b.className = 'night-check' + (weekState[k] ? ' checked' : '');
      b.onclick = () => toggle(k);

      const lbl = document.createElement('span');
      if (si === 1) {
        lbl.innerHTML = `<span class="treatment-name">${step}</span>` +
          (sched.note ? ` <span class="note-tag">${sched.note}</span>` : '');
      } else {
        lbl.textContent = step;
      }
      sr.append(b, lbl);
      stepsCol.appendChild(sr);
    });

    row.append(dayCol, stepsCol);
    nc.appendChild(row);
  });
}

// ── STATS ──────────────────────────────────────────────────────────────────
const AM_TOTAL = MORNING_STEPS.length * 7; // 28
const PM_TOTAL = 7 * 3;                    // 21

function calcWeekStats(state) {
  let am=0, pm=0;
  Object.entries(state).forEach(([k,v]) => {
    if (!v) return;
    if (k.startsWith('am-')) am++;
    if (k.startsWith('pm-')) pm++;
  });
  return {
    amPct: Math.round(am/AM_TOTAL*100),
    pmPct: Math.round(pm/PM_TOTAL*100),
    totalPct: Math.round((am+pm)/(AM_TOTAL+PM_TOTAL)*100),
  };
}

function calcStreak(all) {
  if (!all.length) return 0;
  const sorted = [...all].sort((a,b)=>b.week.localeCompare(a.week));
  let streak=0, expected=weekKey(new Date());
  for (const rec of sorted) {
    if (rec.week===expected) {
      streak++;
      const d=new Date(expected); d.setDate(d.getDate()-7);
      expected=weekKey(d);
    } else break;
  }
  return streak;
}

async function buildStats() {
  const all = await dbGetAll();
  const c = document.getElementById('stats-content');

  if (!all.length) {
    c.innerHTML = `<div class="no-data">No history yet.<br>Check off your routine —<br>data saves automatically.</div>`;
    return;
  }

  const sorted = [...all].sort((a,b)=>b.week.localeCompare(a.week));
  const recent = sorted.slice(0, 10);
  const weekData = recent.map(rec => ({
    ...calcWeekStats(rec.state||{}),
    label: rec.label,
    week: rec.week,
  }));

  const avg = arr => Math.round(arr.reduce((s,v)=>s+v,0)/arr.length);
  const avgTotal = avg(weekData.map(w=>w.totalPct));
  const avgAm    = avg(weekData.map(w=>w.amPct));
  const avgPm    = avg(weekData.map(w=>w.pmPct));
  const streak   = calcStreak(all);

  // Step compliance
  const stepComp = MORNING_STEPS.map((name,si) => {
    let done=0, total=0;
    all.forEach(rec => {
      const s=rec.state||{};
      for (let di=0;di<7;di++) { total++; if (s[`am-${si}-${di}`]) done++; }
    });
    return { name, pct: Math.round(done/total*100) };
  });

  // Treatment compliance
  const treatComp = NIGHT.map((sched,di) => {
    let done=0;
    all.forEach(rec => { if ((rec.state||{})[`pm-${di}-1`]) done++; });
    return { name: sched.t, pct: Math.round(done/all.length*100) };
  });

  c.innerHTML = `
    <div class="stats-section">
      <div class="stats-title">Summary — ${all.length} week${all.length>1?'s':''} tracked</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-val">${avgTotal}%</div><div class="kpi-label">avg total</div></div>
        <div class="kpi"><div class="kpi-val">${avgAm}%</div><div class="kpi-label">morning</div></div>
        <div class="kpi"><div class="kpi-val">${avgPm}%</div><div class="kpi-label">night</div></div>
        <div class="kpi"><div class="kpi-val">${streak}</div><div class="kpi-label">wk streak</div></div>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-title">Completion by week (last ${weekData.length})</div>
      <div class="chart-wrap">
        <div class="chart-bars" id="chart-bars"></div>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Morning</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Night</div>
        </div>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-title">Morning step compliance</div>
      <table class="compliance-table">
        <tr><th>Step</th><th></th><th style="text-align:right">%</th></tr>
        ${stepComp.map(s=>`<tr>
          <td>${s.name}<div class="mini-bar-wrap"><div class="mini-bar" style="width:${s.pct}%"></div></div></td>
          <td></td><td class="pct">${s.pct}%</td>
        </tr>`).join('')}
      </table>
    </div>

    <div class="stats-section">
      <div class="stats-title">Night treatment compliance</div>
      <table class="compliance-table">
        <tr><th>Treatment</th><th></th><th style="text-align:right">%</th></tr>
        ${treatComp.map(t=>`<tr>
          <td>${t.name}<div class="mini-bar-wrap"><div class="mini-bar" style="width:${t.pct}%"></div></div></td>
          <td></td><td class="pct">${t.pct}%</td>
        </tr>`).join('')}
      </table>
    </div>

    <div class="stats-section">
      <div class="stats-title">Data management</div>
      <div class="actions">
        <button class="action-btn danger" onclick="clearHistory()">Clear all history</button>
      </div>
    </div>
  `;

  // draw bars
  const barsEl = document.getElementById('chart-bars');
  const maxH = 80;
  [...weekData].reverse().forEach(w => {
    const g = document.createElement('div');
    g.className = 'bar-group';

    const pair = document.createElement('div');
    pair.className = 'bar-pair';

    const amB = document.createElement('div');
    amB.className = 'bar am';
    amB.style.height = Math.max(2, Math.round(w.amPct/100*maxH)) + 'px';

    const pmB = document.createElement('div');
    pmB.className = 'bar pm';
    pmB.style.height = Math.max(2, Math.round(w.pmPct/100*maxH)) + 'px';

    pair.append(amB, pmB);

    const lbl = document.createElement('div');
    lbl.className = 'bar-lbl';
    lbl.textContent = w.label.split('–')[0].trim();

    g.append(pair, lbl);
    barsEl.appendChild(g);
  });
}

async function clearHistory() {
  if (!confirm('Delete ALL history? Cannot be undone.')) return;
  const all = await dbGetAll();
  for (const r of all) await dbDel(r.week);
  toast('History cleared');
  buildStats();
}

// ── TABS ───────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('tab-tracker').style.display = tab==='tracker' ? '' : 'none';
  document.getElementById('tab-stats').style.display   = tab==='stats'   ? '' : 'none';
  document.querySelectorAll('.nav-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&tab==='tracker')||(i===1&&tab==='stats'))
  );
  if (tab==='stats') buildStats();
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1800);
}

// ── SERVICE WORKER (blob registration — works for file:// and hosted) ───────
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const code = `
const CACHE='skin-v2';
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(
    caches.open(CACHE).then(c => c.add(self.location.href.replace(/\\?.*/,'')))
  );
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));
});
  `;
  try {
    const blob = new Blob([code], {type:'application/javascript'});
    const url  = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  } catch(e) {}
}

// ── INIT ───────────────────────────────────────────────────────────────────
openDB().then(() => {
  loadWeek();
  registerSW();
});
